services:
  edge:
    build:
      context: ..
      dockerfile: probot-stage/Dockerfile
    image: ghcr.io/pudap/probot-stage-edge:latest
    container_name: probot-stage-edge
    restart: unless-stopped
    volumes:
      - ./.env:/app/probot-stage/.env:ro
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
