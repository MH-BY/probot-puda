services:
  edge:
    build:
      context: ..
      dockerfile: stage-probot/Dockerfile
    image: ghcr.io/pudap/stage-probot-edge:latest
    container_name: stage-probot-edge
    restart: unless-stopped
    volumes:
      - ./.env:/app/stage-probot/.env:ro
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
