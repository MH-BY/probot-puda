services:
  edge:
    build:
      context: ..
      dockerfile: smu-keysight-probot/Dockerfile
    image: ghcr.io/pudap/smu-keysight-probot-edge:latest
    container_name: smu-keysight-probot-edge
    restart: unless-stopped
    volumes:
      - ./.env:/app/smu-keysight-probot/.env:ro
      # Writable parameter + data directories (params get rewritten at runtime).
      - ./Parameters:/app/smu-keysight-probot/Parameters
      - ./Data:/app/smu-keysight-probot/Data
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
